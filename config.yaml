

# Default job source when roles[].primary.source is omitted. Search and filters live under roles[].primary only.
primary:
  source: adzuna

defaults:
  # Baseline merged before each role's primary (search.keywords / filter lists union with the role).
  primary:
    search:
      location: ""
    filters:
      min_salary: 0
      max_salary: 0
      job_type: ""
      remote_only: false
      required_keywords: []
      exclude_keywords:
        - "SC Clearance"
      categories: []
  llm:
    must_have_keywords: []
    nice_to_have_keywords: []
    avoid_keywords:
      - "SC Clearance"

# Roles to search for. 
#Do ensure that roles.primary.search.keywords and roles.llm.target_roles are in sync. are in sync.
roles:
  - name: "Solutions Architect"
    enabled: true
    priority: 2
    primary:
      source: adzuna
      search:
        keywords:
          - "Solutions Architect"
          - "solutions architect"
          - "solution architect"
        location: "India"
      filters:
        min_salary: 0
        max_salary: 0
        job_type: ""
        required_keywords: ["Telecom","5G"]
        exclude_keywords:
          - "principal"
          - "director"
          - "VP"
          - "head of"
          - "ServiceNow"
        categories: []
    llm:
      target_roles:
        - "Solution Architect"
      must_have_keywords: 
      nice_to_have_keywords:
        - "AWS"
        - "Architecture"
        - "TMF ODA"
        - "Telecom"
      avoid_keywords:
        - "SC Clearance"
      max_jobs_to_evaluate: 120
      top_k: 30

# Adzuna API settings
adzuna:
  app_id: "d2d34573"
  app_key: "2cee2ab04f1519850a6090d3fdef20c2"
  country: "in"
  results_per_page: 50
  max_pages: 5

# Shared LLM client settings (endpoint, model, limits). Role-specific matching lives under roles[].llm.
llm:
  enabled: true
  mode: "replace"
  endpoint: "https://api.groq.com/openai/v1/chat/completions"
  model: "llama-3.3-70b-versatile"
  api_key_env: "GROQ_API_KEY"
  use_json_mode: true
  max_jobs_to_evaluate: 120
  top_k: 30
  max_description_chars: 400
  timeout_seconds: 45

